services:
  agent:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:8644:8644"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - ./secrets:/app/secrets:ro
      - agent-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock   # spawn sandbox containers
    env_file:
      - .env
    networks:
      - internal

  # Build the sandbox image (used by the harness to spawn per-task containers)
  sandbox:
    build:
      context: .
      dockerfile: sandbox.Dockerfile
    image: lastlight-sandbox:latest
    profiles:
      - build-only     # never started as a service, just built

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    networks:
      - internal

volumes:
  agent-data:       # contains: lastlight.db, claude-home/, sandboxes/, logs/
  caddy-data:
  caddy-config:

networks:
  internal:
