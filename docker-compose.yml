services:
  agent:
    build: .
    restart: unless-stopped
    volumes:
      - ./secrets:/root/secrets:ro
      - agent-state:/root/sessions
      - agent-logs:/root/logs
    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    networks:
      - internal

volumes:
  agent-state:
  agent-logs:
  caddy-data:
  caddy-config:

networks:
  internal:
