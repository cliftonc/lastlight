services:
  agent:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:8644:8644"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - ./secrets:/app/secrets:ro
      - agent-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock   # spawn sandbox containers
    env_file:
      - .env
    environment:
      # V8's default old-space cap (~1.5 GB on 64-bit) is well below the 2g
      # cgroup limit, so Node would OOM before docker did. Raise it close to
      # the container limit so transient bursts have somewhere to land.
      - NODE_OPTIONS=--max-old-space-size=1800
    # Steady-state ~150 MB; bursts during webhook fan-out, the in-process
    # chat skill (full Agent SDK), and the dispatch screening call. 2 GB
    # gives headroom for those bursts while still preventing a runaway leak
    # from taking the host down.
    mem_limit: 2g
    memswap_limit: 2g
    networks:
      - internal

  # Build the sandbox image (used by the harness to spawn per-task containers)
  sandbox:
    build:
      context: .
      dockerfile: sandbox.Dockerfile
    image: lastlight-sandbox:latest
    profiles:
      - build-only     # never started as a service, just built

  # Egress proxy with destination allowlist (src/sandbox/egress-allowlist.ts).
  # Sandbox containers route their HTTPS_PROXY here when running with the
  # default (restricted) egress policy. Tinyproxy filters by CONNECT target —
  # no TLS interception, so no CA cert plumbing inside the sandbox.
  tinyproxy-strict:
    build:
      context: ./deploy
      dockerfile: tinyproxy.Dockerfile
    image: lastlight-tinyproxy:latest
    restart: unless-stopped
    environment:
      # The harness writes strict.conf / open.conf / filter.txt into
      # $STATE_DIR/proxy/ at boot. We mount the agent-data volume and point
      # tinyproxy at the file inside it. (docker-compose can't bind a
      # named-volume subpath into /etc/tinyproxy directly.)
      - TINYPROXY_CONF=/app/data/proxy/strict.conf
    volumes:
      - agent-data:/app/data:ro
    networks:
      - internal
      - sandbox-egress

  tinyproxy-open:
    image: lastlight-tinyproxy:latest
    restart: unless-stopped
    depends_on:
      - tinyproxy-strict           # so the shared image is built once
    environment:
      - TINYPROXY_CONF=/app/data/proxy/open.conf
    volumes:
      - agent-data:/app/data:ro
    networks:
      - internal
      - sandbox-egress

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    # Caddy's memory footprint is tiny (typically <50 MB even under load).
    mem_limit: 256m
    memswap_limit: 256m
    networks:
      - internal

volumes:
  agent-data:       # contains: lastlight.db, agent-sessions/, sandboxes/, secrets/, logs/, proxy/
  caddy-data:
  caddy-config:

networks:
  internal:
  # Sandbox containers (created dynamically by src/sandbox/docker.ts) attach
  # to this network only. `internal: true` disables direct host egress, so
  # the only path to the public internet is through tinyproxy-strict /
  # tinyproxy-open (which are dual-homed onto both networks).
  sandbox-egress:
    internal: true
