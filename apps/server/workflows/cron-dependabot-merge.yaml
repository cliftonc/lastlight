kind: cron
name: merge-green-dependency-prs
# Once a day, mid-afternoon (server-local time). The pr.checks_passed webhook
# does the real-time merging; this sweep is only a backstop for PRs that went
# green before boot or during a missed delivery, so a daily cadence is plenty
# (and keeps a stale managedRepos entry from spamming failed runs every 30 min).
schedule: "0 14 * * *"
workflow: dependabot-pr-merge
context:
  mode: scan
# NOTE: unlike cron-review, this scan intentionally has NO
# `condition.unless: webhooksEnabled`. The pr.checks_passed webhook merges
# newly-green PRs in real time; this cron is an additive *sweep* that also runs
# with webhooks on, catching dependency PRs that went green before boot or
# during a missed delivery. Enabling auto-merge is idempotent, so overlap with
# the webhook path is harmless.
