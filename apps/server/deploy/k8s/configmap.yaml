apiVersion: v1
kind: ConfigMap
metadata:
  name: lastlight-config
  namespace: lastlight
data:
  # Overlay layered over the image's config/default.yaml. At minimum set the
  # repos the bot manages. EDIT managedRepos before applying.
  config.yaml: |
    managedRepos:
      - your-org/your-repo
    sandbox:
      backend: gondolin
