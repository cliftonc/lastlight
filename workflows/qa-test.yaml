kind: qa-test
name: qa-test
description: |
  Run an automated QA flow against a repo's CLI or locally-served app and report
  step-level pass/fail with evidence. Single agent invocation: it installs and
  runs the code in the sandbox, exercises a flow (CLI invocations or curl against
  a dev-server), and posts a per-step QA report. Does not modify code.

  Delivery is uniform with `answer`: the agent's final message (the report) is
  captured as `qaResult` and posted by the harness via `postComment` — as a
  comment on the originating issue/PR for GitHub-initiated runs, or into the
  Slack thread for Slack-initiated runs. The skill therefore does NOT post the
  report itself.

  When the host runs the docker backend with the browser-QA image built, a
  second gated phase drives a real headless Chromium against the locally-served
  app and posts step-level screenshot evidence on top of the text report;
  everywhere else that phase is silently skipped (graceful degradation) and the
  text report stands alone.

  Triggered by:
    - a `@last-light qa-test <target> [-- steps]` comment on an issue/PR
    - manual CLI: tsx src/cli.ts qa-test owner/repo#N -- "<steps>"

phases:
  - name: phase_0
    label: Context
    type: context

  - name: qa_test
    label: QA Test
    prompt: prompts/qa-test.md
    # qa-test: the flow procedure + report shape (primary).
    # building: install + run the repo to exercise the flow.
    skills: [qa-test, building]
    model: "{{models.qa-test}}"
    variant: "{{variants.qa-test}}"
    output_var: qaResult
    messages:
      on_start: "Running the QA flow — installing, running, and exercising each step..."
      on_success: "{{qaResult}}"
      on_failure: "I couldn't complete the QA run — see the logs for details."

  # Browser-QA pass (Tier B). Gated to the docker backend AND the enriched
  # `lastlight-sandbox-qa:latest` image (Playwright + Chromium). On gondolin, or
  # a docker host without that image, the scheduler silently skips this phase —
  # so it must stay terminal (nothing depends on it). When it runs it drives the
  # UI and posts a supplementary screenshot-evidence comment; the text report
  # above is always the baseline.
  - name: qa_browser
    label: QA Test (browser)
    prompt: prompts/qa-browser.md
    skills: [qa-test, building, browser-qa]
    model: "{{models.qa-test}}"
    variant: "{{variants.qa-test}}"
    requires_sandbox: docker
    sandbox_image: qa
    output_var: qaBrowserResult
    messages:
      on_start: "Browser QA available — driving the UI and capturing screenshots..."
      on_success: "{{qaBrowserResult}}"
      on_failure: "The browser-QA pass couldn't complete — the text report above stands."
