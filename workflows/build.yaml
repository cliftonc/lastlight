kind: build
name: build
description: "Architect -> Executor -> Reviewer build cycle"
trigger: build

phases:
  - name: phase_0
    label: Context
    type: context

  - name: guardrails
    label: Guardrails
    prompt: prompts/guardrails.md
    model: "{{models.guardrails}}"
    on_output:
      contains_BLOCKED:
        action: fail
        message: "Guardrails check: BLOCKED"
        unless_label: "lastlight:bootstrap"
      contains_READY:
        action: continue

  - name: architect
    label: Architect
    prompt: prompts/architect.md
    model: "{{models.architect}}"
    approval_gate: post_architect

  - name: executor
    label: Executor
    prompt: prompts/executor.md
    model: "{{models.executor}}"

  - name: reviewer
    label: Reviewer
    prompt: prompts/reviewer.md
    model: "{{models.reviewer}}"
    loop:
      max_cycles: 2
      on_request_changes:
        fix_prompt: prompts/fix.md
        fix_model: "{{models.fix}}"
        re_review_prompt: prompts/re-reviewer.md
      approval_gate: post_reviewer

  - name: pr
    label: PR
    prompt: prompts/pr.md
    model: "{{models.pr}}"
    on_success:
      set_phase: complete
