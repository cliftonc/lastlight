kind: verify
name: verify
description: |
  Verify a behaviour claim against a repo or PR and report whether the evidence
  confirms or refutes it. Single agent invocation: it installs and runs the
  code in the sandbox, captures bash/text evidence, and posts a
  CONFIRMED / REFUTED / INCONCLUSIVE report. Does not modify code.

  Delivery is uniform with `answer`: the agent's final message (the report) is
  captured as `verifyResult` and posted by the harness via `postComment` — as a
  comment on the originating issue/PR for GitHub-initiated runs, or into the
  Slack thread for Slack-initiated runs. The skill therefore does NOT post the
  report itself.

  When the host runs the docker backend with the browser-QA image built, a
  second gated phase drives the UI in a real headless Chromium and posts
  screenshot evidence on top of the text verdict; everywhere else that phase is
  silently skipped (graceful degradation) and the text verdict stands alone.

  Triggered by:
    - a `@last-light verify <claim>` comment on an issue/PR
    - manual CLI: tsx src/cli.ts verify owner/repo#N -- "<claim>"

phases:
  - name: phase_0
    label: Context
    type: context

  - name: verify
    label: Verify
    prompt: prompts/verify.md
    # verify: the investigator procedure + report shape (primary).
    # building: install + run the repo to capture evidence.
    skills: [verify, building]
    model: "{{models.verify}}"
    variant: "{{variants.verify}}"
    output_var: verifyResult
    messages:
      on_start: "Verifying the claim — installing, running, and capturing evidence..."
      on_success: "{{verifyResult}}"
      on_failure: "I couldn't complete the verification — see the logs for details."

  # Browser-QA pass (Tier B). Gated to the docker backend AND the enriched
  # `lastlight-sandbox-qa:latest` image (Playwright + Chromium). On gondolin, or
  # a docker host without that image, the scheduler silently skips this phase —
  # so it must stay terminal (nothing depends on it). When it runs it posts a
  # supplementary screenshot-evidence comment; the text verdict above is always
  # the baseline.
  - name: verify_browser
    label: Verify (browser)
    prompt: prompts/verify-browser.md
    skills: [verify, building, browser-qa]
    model: "{{models.verify}}"
    variant: "{{variants.verify}}"
    requires_sandbox: docker
    sandbox_image: qa
    output_var: verifyBrowserResult
    messages:
      on_start: "Browser QA available — driving the UI and capturing screenshots..."
      on_success: "{{verifyBrowserResult}}"
      on_failure: "The browser-QA pass couldn't complete — the text verdict above stands."
