name: Deploy www

# Deploy the marketing/docs site (apps/www → lastlight.dev) to Cloudflare.
#
# A deploy-only LEAF job — deliberately NOT part of the shared CI (ci.yml). It
# fires on push to `main` when either the site source OR the spec pages it
# renders change (apps/www's sync-spec pulls apps/server/spec at build time), so
# a spec edit re-renders the docs pages without a manual deploy.
#
# Requires the CLOUDFLARE_API_TOKEN repo secret (a token scoped to Workers
# deploys on the lastlight.dev zone account) — set by a human, referenced here.
on:
  push:
    branches:
      - main
    paths:
      - "apps/www/**"
      - "apps/server/spec/**"

# One deploy at a time; let a newer push supersede an in-flight one.
concurrency:
  group: deploy-www
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # sync-spec (prebuild) copies apps/server/spec → the site's content dir,
      # then astro builds ./dist.
      - name: Build site
        run: pnpm --filter lastlight-www build

      - name: Deploy to Cloudflare
        run: pnpm exec wrangler deploy
        working-directory: apps/www
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
