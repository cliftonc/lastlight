name: Publish to npm

# Publishing is gated to a GitHub Release: cutting a release (which carries the
# v* tag) is the deliberate trigger, so a bare tag push never publishes on its
# own. Flow: `npm version <patch|minor|major>` → push main + the tag → create a
# Release on that tag → this runs.
on:
  release:
    types: [published]

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      # For a release event, default checkout resolves to the release's tag.
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npx vitest run

      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish --provenance --access public
