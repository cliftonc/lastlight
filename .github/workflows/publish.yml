name: Publish to npm

on:
  # Preferred path: create a GitHub Release. This fires reliably even when
  # the underlying tag was pushed alongside branch commits (which can
  # suppress a bare `push: tags:` event).
  release:
    types: [published]

  # Backup: bare tag push (works when the tag is pushed in its own
  # `git push` invocation, separate from any branch push).
  push:
    tags:
      - 'v*.*.*'

  # Manual escape hatch: kick off a publish from the Actions tab. Accepts
  # an explicit `ref` so you can re-run a previous tag's publish.
  workflow_dispatch:
    inputs:
      ref:
        description: 'Tag or commit SHA to publish (e.g. v0.1.1)'
        required: true
        type: string

permissions:
  contents: read
  # Required for OIDC-based "trusted publishing" with npm. Without this
  # the OIDC token can't be minted and `npm publish` falls back to
  # token-based auth (which we don't configure).
  id-token: write

jobs:
  publish:
    name: build, test, publish
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # `release` events default to checking out the release's target
          # commit; `push` tags use GITHUB_REF; `workflow_dispatch` needs
          # the explicit input. This branch handles all three.
          ref: ${{ inputs.ref || github.event.release.tag_name || github.ref }}

      # setup-node@v6 no longer writes the deprecated `always-auth=true`
      # to .npmrc (fixed in actions/setup-node#1305). The dummy
      # `_authToken=${NODE_AUTH_TOKEN}` line it does write is harmless
      # under OIDC trusted publishing per actions/setup-node#1551.
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      # Trusted publishing landed in npm 11.5. Node 22 LTS ships an older
      # npm; pin to a current major to be safe.
      - name: Upgrade npm
        run: npm install --global npm@latest

      - name: Install dependencies
        run: npm ci

      # Tag must match package.json version exactly. This catches the
      # common footgun of tagging v0.2.0 while package.json still says
      # 0.1.0 — without the check, `npm publish` would happily publish
      # 0.1.0 again (or fail with "version already exists" if the
      # previous one's still there).
      - name: Verify tag matches package.json version
        run: |
          # Resolve the tag from whichever trigger fired this run.
          if [ -n "${{ inputs.ref }}" ]; then
            tag_ref="${{ inputs.ref }}"
          elif [ -n "${{ github.event.release.tag_name }}" ]; then
            tag_ref="${{ github.event.release.tag_name }}"
          else
            tag_ref="${GITHUB_REF#refs/tags/}"
          fi
          # Strip the leading 'v' if present.
          tag="${tag_ref#v}"
          pkg=$(node -p "require('./package.json').version")
          if [ "$tag" != "$pkg" ]; then
            echo "::error::Tag ref '$tag_ref' (version '$tag') does not match package.json version '$pkg'"
            exit 1
          fi
          echo "Publishing version $pkg"

      - name: Type-check
        run: npm run check

      - name: Build
        run: npm run build

      # Unit tests only — integration tests cost real money and the CI
      # workflow already gated those on every PR / push to main.
      - name: Unit tests
        run: npm run test:unit

      # --provenance attaches a signed statement linking the published
      # package to this exact workflow run + commit SHA. Visible on the
      # npm package page.
      # --access public is required for scoped packages but harmless
      # for unscoped ones.
      - name: Publish to npm
        run: npm publish --provenance --access public
